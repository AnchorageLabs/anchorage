<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchorage — 3D Logo</title>
    <style>
      :root {
        --bg: #1a1a2e;
        --text: #e0e8ff;
      }
      [data-theme="light"] {
        --bg: #f0f4ff;
        --text: #1a1a2e;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg, #1a1a2e);
        color: var(--text, #e0e8ff);
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        margin-bottom: 2rem;
        letter-spacing: 0.05em;
      }
      .hero {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        max-width: 900px;
        margin: auto;
        overflow: hidden;
      }
      @media (max-width: 600px) {
        .hero {
          aspect-ratio: 4 / 3;
        }
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .fallback {
        display: none;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .no-js canvas {
        display: none;
      }
      .no-js .fallback {
        display: block;
      }
    </style>
  </head>
  <body class="no-js">
    <h1>Anchorage</h1>
    <div
      class="hero"
      id="hero-container"
      aria-label="Anchorage 3D logo"
      role="img"
    >
      <canvas id="hero-canvas" aria-hidden="true"></canvas>
      <noscript>
        <img
          src="logo.svg"
          alt="Anchorage logo"
          class="fallback"
        />
      </noscript>
    </div>

    <script type="module">
      document.body.classList.remove("no-js");

      const THREE_CDN = "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js";
      const SVG_LOADER_CDN =
        "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/SVGLoader.js";

      const {
        SCENE_COLORS,
        CAMERA_CONFIG,
        EXTRUDE_CONFIG,
        ROTATION_DELTA,
        getPreferredTheme,
        shouldRotate,
        clampPixelRatio,
      } = await import("./dist/scene-config.js");

      const [THREE, { SVGLoader }] = await Promise.all([
        import(THREE_CDN),
        import(SVG_LOADER_CDN),
      ]);

      const container = document.getElementById("hero-container");
      const canvas = document.getElementById("hero-canvas");

      function getThemeColors() {
        const theme = getPreferredTheme(document.documentElement.dataset.theme);
        return SCENE_COLORS[theme];
      }

      async function initScene() {
        let renderer;
        try {
          renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        } catch {
          const fallback = document.querySelector(".fallback") ?? document.querySelector("noscript img");
          if (fallback) fallback.style.display = "block";
          if (canvas) canvas.style.display = "none";
          return;
        }

        renderer.setPixelRatio(clampPixelRatio(window.devicePixelRatio));
        renderer.setSize(container.clientWidth, container.clientHeight);

        const scene = new THREE.Scene();
        const colors = getThemeColors();
        scene.background = new THREE.Color(colors.background);

        const camera = new THREE.PerspectiveCamera(
          CAMERA_CONFIG.fov,
          container.clientWidth / container.clientHeight,
          0.1,
          1000,
        );
        camera.position.set(...CAMERA_CONFIG.position);
        camera.lookAt(...CAMERA_CONFIG.lookAt);

        const ambient = new THREE.AmbientLight(colors.ambient, 0.4);
        scene.add(ambient);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const svgText = await fetch("./logo.svg").then((r) => r.text());
        const loader = new SVGLoader();
        const svgData = loader.parse(svgText);
        const shapes = svgData.paths.flatMap((p) => SVGLoader.createShapes(p));

        const geometry = new THREE.ExtrudeGeometry(shapes, EXTRUDE_CONFIG);
        geometry.center();

        const material = new THREE.MeshStandardMaterial({
          color: new THREE.Color(colors.material),
          metalness: 0.3,
          roughness: 0.6,
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

        prefersReducedMotion.addEventListener("change", () => {});

        function applyTheme() {
          const c = getThemeColors();
          scene.background = new THREE.Color(c.background);
          material.color.set(c.material);
          ambient.color.set(c.ambient);
        }

        new MutationObserver(applyTheme).observe(document.documentElement, {
          attributes: true,
          attributeFilter: ["data-theme"],
        });

        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", applyTheme);

        const resizeObserver = new ResizeObserver(() => {
          const w = container.clientWidth;
          const h = container.clientHeight;
          renderer.setSize(w, h);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
        });
        resizeObserver.observe(container);

        function animate() {
          requestAnimationFrame(animate);
          if (shouldRotate(prefersReducedMotion.matches)) {
            mesh.rotation.y += ROTATION_DELTA;
          }
          renderer.render(scene, camera);
        }
        animate();
      }

      const observer = new IntersectionObserver(
        (entries) => {
          if (entries[0]?.isIntersecting) {
            observer.disconnect();
            initScene();
          }
        },
        { threshold: 0.1 },
      );
      observer.observe(container);
    </script>
  </body>
</html>

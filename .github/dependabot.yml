version: 2

# Version updates are disabled (open-pull-requests-limit: 0) so Dependabot does
# NOT open dependency PRs automatically. Dependabot security alerts remain
# enabled at the repo level and continue to surface vulnerability counts.
updates:
  # npm/pnpm version updates — PRs disabled
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 0
    reviewers:
      - "ValentinTorassa"
      - "solsoletti"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group all devDependencies updates together
    groups:
      dev-dependencies:
        patterns:
          - "@biomejs/*"
          - "@types/*"
          - "typescript"
          - "vitest"

  # GitHub Actions version updates — PRs disabled
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 0
    reviewers:
      - "ValentinTorassa"
      - "solsoletti"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"

name: release-cli

# Publishes the @anchorage/cli as standalone, self-contained binaries (no Node
# required for the end user) to a GitHub Release. Bun cross-compiles one binary
# per OS/arch from the pure-Node CLI entry. Cut a release by pushing a tag:
#
#   git tag cli-v0.1.0 && git push origin cli-v0.1.0
#
# Then install with:
#   curl -fsSL https://github.com/AnchorageLabs/anchorage/releases/latest/download/install.sh | sh
on:
  push:
    tags: ["cli-v*"]
  workflow_dispatch:

permissions:
  contents: write # create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build standalone binaries
        run: |
          set -euo pipefail
          mkdir -p dist-cli
          entry="cli/anchorage/src/index.ts"
          # --compile embeds the Bun runtime + bundled JS into one executable.
          bun build "$entry" --compile --target=bun-darwin-arm64 --outfile dist-cli/anchorage-darwin-arm64
          bun build "$entry" --compile --target=bun-darwin-x64   --outfile dist-cli/anchorage-darwin-x64
          bun build "$entry" --compile --target=bun-linux-x64    --outfile dist-cli/anchorage-linux-x64
          bun build "$entry" --compile --target=bun-windows-x64  --outfile dist-cli/anchorage-windows-x64.exe

      - name: Checksums + bundle installers
        run: |
          set -euo pipefail
          cp cli/anchorage/install.sh cli/anchorage/install.ps1 dist-cli/
          (cd dist-cli && sha256sum anchorage-darwin-arm64 anchorage-darwin-x64 anchorage-linux-x64 anchorage-windows-x64.exe > SHA256SUMS)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist-cli/anchorage-darwin-arm64
            dist-cli/anchorage-darwin-x64
            dist-cli/anchorage-linux-x64
            dist-cli/anchorage-windows-x64.exe
            dist-cli/SHA256SUMS
            dist-cli/install.sh
            dist-cli/install.ps1
